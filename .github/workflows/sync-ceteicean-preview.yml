name: Sync CETEIcean Preview to WebDAV

on:
  push:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes in CETEIcean
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # handle first commit or force push
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files src/lib/CETEIcean || true)
            echo "$CHANGED" | sed 's/^/A /' > changes.txt
          else
            git diff --name-status "$BEFORE" "$AFTER" | grep '^.\s\+src/lib/CETEIcean' > changes.txt || true
          fi

          if [ ! -s changes.txt ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Exit early if no relevant changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes in src/lib/CETEIcean — skipping sync."

      - name: Install rclone
        if: steps.changes.outputs.changed == 'true'
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (WebDAV)
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
            [webdav]
            type = webdav
            url = ${{ secrets.WEBDAV_URL }}
            vendor = apache
            user = ${{ secrets.WEBDAV_USERNAME }}
            pass = ${{ secrets.WEBDAV_PASSWORD }}
          EOF

      - name: Create deployment log entry
        if: steps.changes.outputs.changed == 'true'
        run: |
          DEPLOY_DIR="src/lib/CETEIcean"
          LOG_DIR="$DEPLOY_DIR/logs"

          DATE_FILE=$(date -u +"%Y-%m-%d_%H-%M")
          DATE_HUMAN=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')

          FILENAME="${DATE_FILE}_${COMMIT}.md"

          mkdir -p "$LOG_DIR"

          {
            echo "### Deployment $DATE_HUMAN"
            echo ""
            echo "- Commit: $COMMIT"
            echo "- Author: $AUTHOR"
            echo ""
            echo "#### Changes"
            sed 's/^/- /' changes.txt
          } > "$LOG_DIR/$FILENAME"

      - name: Sync CETEIcean to WebDAV
        if: steps.changes.outputs.changed == 'true'
        run: |
          rclone sync src/lib/CETEIcean webdav:preview --delete-during
